# SparkyFitness — nginx frontend (PUBLIC entry point)
# Mirrors the `sparkyfitness-frontend` service. Serves the React build and
# reverse-proxies /api/, /uploads/, /mcp, /health-data to the backend.
# This is the only app with a public IP.
app = 'sparkyfitness-frontend'   # EXAMPLE — globally-unique on Fly; pick your own (see README). If renamed, also update FRONTEND_URL below + FRONTEND_URL in server/fly.toml
primary_region = 'lax'

[build]
  image = 'codewithcj/sparkyfitness:latest'

[env]
  # Point nginx's upstream at the backend's flycast address (overrides the
  # image default of `sparkyfitness-server`).
  SPARKY_FITNESS_SERVER_HOST = 'sparkyfitness-server.flycast'
  SPARKY_FITNESS_SERVER_PORT = '3010'

  # Image runs nginx as root -> default listen port 80 and file-based logs.
  # Pin the port and redirect logs to stdout/stderr so `fly logs` shows them.
  NGINX_LISTEN_PORT = '80'
  NGINX_ACCESS_LOG = '/dev/stdout'
  NGINX_ERROR_LOG = '/dev/stderr'

  # Used for CORS / absolute URLs — must match the deployed hostname.
  SPARKY_FITNESS_FRONTEND_URL = 'https://sparkyfitness-frontend.fly.dev'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'requests'
    soft_limit = 200
    hard_limit = 250

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
